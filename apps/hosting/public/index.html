<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI Gold Roblox</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: linear-gradient(135deg, #FFD93D 0%, #FF2D7B 50%, #4A126E 100%);
  color: #fff;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px;
}
.card {
  max-width: 560px;
  background: rgba(0, 0, 0, 0.35);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-radius: 28px;
  padding: 48px 36px;
  text-align: center;
  border: 1px solid rgba(255, 255, 255, 0.15);
}
h1 { font-size: 36px; margin-bottom: 12px; letter-spacing: -0.5px; }
p { font-size: 16px; line-height: 1.55; opacity: 0.9; margin-bottom: 28px; }
.links { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
a {
  display: inline-block;
  padding: 12px 24px;
  background: rgba(255, 255, 255, 0.18);
  color: #fff;
  text-decoration: none;
  border-radius: 999px;
  font-weight: 600;
  font-size: 14px;
  transition: background 0.15s;
}
a:hover { background: rgba(255, 255, 255, 0.3); }
.icon { font-size: 56px; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🎮✨</div>
  <h1>AI Gold Roblox</h1>
  <p>Build viral Roblox games and content in one tap with AI. Record cinematic 9:16 clips and share to TikTok, Reels, and Shorts.</p>
  <div class="links">
    <a href="/privacy">Privacy Policy</a>
    <a href="/terms">Terms of Service</a>
  </div>
</div>
</body>
</html>
